name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (without heavy embedding deps)
        run: |
          python -m pip install --upgrade pip
          pip install numpy faiss-cpu pytest pyyaml "pydantic>=2" typer plotly jinja2 psutil requests tqdm
          pip install -e . --no-deps
      - name: Run tests
        run: pytest -q
      - name: Smoke run (synthetic quickstart)
        run: vectorbench run examples/quickstart.yaml
