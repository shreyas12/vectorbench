# benchmark-50k — real 50K-doc corpus, downloaded on first run and cached. This is the
# config behind the flagship Pareto chart: a visible Flat-vs-HNSW latency gap on real
# semantics. The data is 50,000 Simple English Wikipedia docs + 200 title queries
# (CC BY-SA 4.0), hosted as a checksum-pinned GitHub release asset (data-v1) and built by
# scripts/build_wiki_50k.py. sha256 fields verify the DECOMPRESSED files.
name: benchmark_50k

dataset:
  remote:
    name: benchmark-50k
    url: https://github.com/shreyas12/vectorbench/releases/download/data-v1/corpus.jsonl.gz
    sha256: b9e3719c245271cb5922fa6d2b3aa225e394c909da7b4f9a75d240ae715eba88
    queries_url: https://github.com/shreyas12/vectorbench/releases/download/data-v1/queries.jsonl.gz
    queries_sha256: 70f9d6ae89825677113edf419348291089cfeb44b713e30d7416628d35dc5636

embedding:
  model: BAAI/bge-small-en-v1.5

similarity: cosine

index:
  flat: true
  hnsw:
    M: 32
    ef_construction: 200
    ef_search: [16, 32, 64, 128, 256, 512]

evaluation:
  k: 10
  warmup_queries: 5
  min_queries: 200
  repetitions: 3

output:
  dir: runs/

seed: 42
